<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>母亲节快乐</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans",
        "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      background: radial-gradient(900px 420px at 12% 0%, rgba(255, 110, 170, 0.35), transparent 60%),
        radial-gradient(800px 380px at 88% 12%, rgba(255, 170, 110, 0.28), transparent 55%),
        linear-gradient(180deg, rgba(255, 245, 250, 0.92), rgba(255, 255, 255, 0.92));
    }
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart {
      position: absolute;
      top: -40px;
      width: 18px;
      height: 18px;
      background: rgba(255, 82, 152, 0.35);
      transform: rotate(45deg);
      border-radius: 4px;
      animation: floatDown linear infinite;
      filter: blur(0.2px);
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: inherit;
      border-radius: 50%;
    }
    .heart::before {
      left: -9px;
      top: 0;
    }
    .heart::after {
      top: -9px;
      left: 0;
    }
    @keyframes floatDown {
      from {
        transform: translateY(-20px) rotate(45deg);
      }
      to {
        transform: translateY(calc(100vh + 60px)) rotate(45deg);
      }
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 56px;
      position: relative;
      z-index: 1;
    }
    h1 {
      margin: 0 0 8px;
      letter-spacing: 0.2px;
    }
    .subtitle {
      margin: 0 0 24px;
      opacity: 0.75;
    }
    .card {
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 14px;
      padding: 16px 16px 14px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      appearance: none;
      border: 1px solid rgba(127, 127, 127, 0.25);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font: inherit;
    }
    button:hover {
      background: rgba(255, 255, 255, 0.9);
    }
    .sign {
      margin-top: 14px;
      opacity: 0.9;
    }
    .sign input {
      width: min(340px, 100%);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(127, 127, 127, 0.25);
      background: rgba(255, 255, 255, 0.7);
      font: inherit;
    }
    figure {
      margin: 18px 0 0;
    }
    img {
      width: 100%;
      height: min(70vh, 560px);
      object-fit: contain;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 12px;
      border: 1px solid rgba(127, 127, 127, 0.25);
      display: block;
    }
    figcaption {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.75;
    }
    a {
      color: inherit;
    }
    .music {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 18px;
      opacity: 0.92;
      flex-wrap: wrap;
    }
    .music .hint {
      font-size: 14px;
      opacity: 0.75;
    }
    .music .status {
      font-size: 14px;
      opacity: 0.82;
    }
    .galleryHint {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.78;
    }
    .dots {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(127, 127, 127, 0.35);
      background: rgba(127, 127, 127, 0.18);
    }
    .dot.active {
      background: rgba(255, 82, 152, 0.65);
      border-color: rgba(255, 82, 152, 0.9);
    }
    #fxCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    .modalOverlay {
      position: fixed;
      inset: 0;
      z-index: 11;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(20, 10, 18, 0.35);
      backdrop-filter: blur(6px);
    }
    .modalOverlay.show {
      display: flex;
    }
    .modal {
      width: min(720px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.75);
      color: rgba(20, 10, 18, 0.92);
      padding: 16px 16px 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.25);
    }
    .modalHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .modalTitle {
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .modalClose {
      border-radius: 12px;
      padding: 8px 10px;
    }
    .modal pre {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.7;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <canvas id="fxCanvas" aria-hidden="true"></canvas>
  <div class="hearts" aria-hidden="true">
    <span class="heart" style="left: 8%; animation-duration: 10s; opacity: 0.22; transform: rotate(45deg) scale(0.9);"></span>
    <span class="heart" style="left: 18%; animation-duration: 13s; opacity: 0.18; transform: rotate(45deg) scale(1.2);"></span>
    <span class="heart" style="left: 34%; animation-duration: 11s; opacity: 0.24; transform: rotate(45deg) scale(0.8);"></span>
    <span class="heart" style="left: 52%; animation-duration: 14s; opacity: 0.16; transform: rotate(45deg) scale(1.35);"></span>
    <span class="heart" style="left: 66%; animation-duration: 12s; opacity: 0.2; transform: rotate(45deg) scale(0.95);"></span>
    <span class="heart" style="left: 78%; animation-duration: 15s; opacity: 0.14; transform: rotate(45deg) scale(1.45);"></span>
    <span class="heart" style="left: 90%; animation-duration: 11.5s; opacity: 0.2; transform: rotate(45deg) scale(0.85);"></span>
  </div>
  <main>
    <h1>母亲节快乐</h1>
    <p class="subtitle">献给世界上最温柔、最伟大的妈妈。</p>
    <div class="music" aria-label="背景音乐">
      <button id="musicBtn" type="button">播放音乐</button>
      <span class="status" id="musicStatus">状态：准备中</span>
      <span class="hint">提示：浏览器可能会拦截“有声音的自动播放”，点击页面一次即可解锁。</span>
    </div>

    <section class="card" aria-label="母亲节祝福">
      <p>
        妈妈，辛苦了！愿你所愿皆所得，所念皆所想！每天都开开心心、健健康康、幸运常伴，美貌常驻！
      </p>
      <p>
        今天把最真挚的祝福送给你：<strong>母亲节快乐！</strong>
      </p>
      <p class="sign">
        署名：
        <input id="signName" type="text" placeholder="哈哈哈哈哈哈Y" maxlength="20" />
      </p>
      <div class="actions">
        <button id="wishBtn" type="button">点我收下祝福</button>
      </div>

      <figure>
        <img id="photo" src="./1.jpg" alt="母亲节相册图片（点击切换）" />
        <figcaption>
          相册会按顺序显示同目录下的 <code>1.jpg</code>～<code>7.jpg</code>。点击图片即可切换下一张。
        </figcaption>
        <div class="galleryHint" id="galleryHint">当前：第 1 / 6 张（点击图片切换）</div>
        <div class="dots" id="dots" aria-hidden="true"></div>
      </figure>
    </section>
  </main>

  <div id="wishModal" class="modalOverlay" role="dialog" aria-modal="true" aria-label="祝福弹窗">
    <div class="modal">
      <div class="modalHeader">
        <div class="modalTitle">祝福已送达</div>
        <button id="modalCloseBtn" class="modalClose" type="button">关闭</button>
      </div>
      <pre id="wishText"></pre>
    </div>
  </div>

  <audio id="bgm" preload="auto" loop autoplay muted playsinline>
    <!-- 请把音乐文件放在 try.html 同目录，并把文件名改成下面这个（或自己改 src）。 -->
    <source src="./陪我长大.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const signInput = document.getElementById("signName");
    const wishBtn = document.getElementById("wishBtn");
    const copyBtn = document.getElementById("copyBtn");
    const bgm = document.getElementById("bgm");
    const musicBtn = document.getElementById("musicBtn");
    const musicStatus = document.getElementById("musicStatus");
    const photo = document.getElementById("photo");
    const galleryHint = document.getElementById("galleryHint");
    const dotsWrap = document.getElementById("dots");
    const wishModal = document.getElementById("wishModal");
    const wishText = document.getElementById("wishText");
    const modalCloseBtn = document.getElementById("modalCloseBtn");

    // --- 相册：点击图片切换（1.jpg ~ 6.jpg） ---
    const photos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg"].map(
      (n) => `./${n}`
    );
    let photoIndex = 0;

    function renderDots() {
      if (!dotsWrap) return;
      dotsWrap.innerHTML = "";
      for (let i = 0; i < photos.length; i++) {
        const dot = document.createElement("span");
        dot.className = "dot" + (i === photoIndex ? " active" : "");
        dotsWrap.appendChild(dot);
      }
    }

    function setPhoto(index) {
      photoIndex = (index + photos.length) % photos.length;
      if (photo) photo.src = photos[photoIndex];
      if (galleryHint)
        galleryHint.textContent = `当前：第 ${photoIndex + 1} / ${
          photos.length
        } 张（点击图片切换）`;
      renderDots();
    }

    // 预加载，避免切换闪烁
    for (const src of photos) {
      const img = new Image();
      img.src = src;
    }

    if (photo) {
      photo.addEventListener("click", (e) => {
        e.stopPropagation();
        setPhoto(photoIndex + 1);
      });
      photo.addEventListener("error", () => {
        if (galleryHint) {
          galleryHint.textContent =
            "图片加载失败：请确认同目录下存在 1.jpg～6.jpg（文件名需完全一致）。";
        }
      });
    }
    setPhoto(0);

    // --- 背景音乐（更稳的策略） ---
    // 1) 先“静音自动播放”（大多数浏览器允许）
    // 2) 用户第一次点击页面后，自动取消静音并继续播放
    // 3) 也提供按钮手动播放/暂停
    function setMusicStatus(text) {
      if (musicStatus) musicStatus.textContent = "状态：" + text;
    }

    async function tryPlayMuted() {
      if (!bgm) return;
      bgm.volume = 0.75;
      bgm.muted = true;
      try {
        await bgm.play();
        setMusicStatus("静音播放中（点击页面开启声音）");
        if (musicBtn) musicBtn.textContent = "暂停音乐";
      } catch {
        setMusicStatus("被浏览器拦截（点击页面或按钮）");
        if (musicBtn) musicBtn.textContent = "播放音乐";
      }
    }

    async function enableSoundAndPlay() {
      if (!bgm) return;
      try {
        bgm.muted = false;
        await bgm.play();
        setMusicStatus("播放中");
        if (musicBtn) musicBtn.textContent = "暂停音乐";
      } catch {
        setMusicStatus("仍被拦截（请用 HTTP 方式打开）");
      }
    }

    function toggleMusicByButton() {
      if (!bgm) return;
      if (!bgm.paused) {
        bgm.pause();
        setMusicStatus("已暂停");
        if (musicBtn) musicBtn.textContent = "播放音乐";
        return;
      }
      // 优先尝试有声播放；不行就先静音播放
      enableSoundAndPlay().catch(() => {});
      setTimeout(() => {
        if (bgm.paused) tryPlayMuted();
      }, 50);
    }

    if (musicBtn) musicBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleMusicByButton();
    });

    if (bgm) {
      bgm.addEventListener("playing", () => {
        if (bgm.muted) setMusicStatus("静音播放中（点击页面开启声音）");
        else setMusicStatus("播放中");
      });
      bgm.addEventListener("pause", () => setMusicStatus("已暂停"));
      bgm.addEventListener("error", () =>
        setMusicStatus("音频加载失败：请确认同目录下存在“陪我长大.mp3”")
      );
    }

    tryPlayMuted();

    function buildWish() {
      const name = (signInput.value || "").trim();
      const sign = name ? `—— ${name}` : "—— 爱你❤";
      return `母亲节快乐！\n妈妈，辛苦了！愿你每天都开心、健康、被温柔以待。\n${sign}`;
    }

    // 满屏烟花：持续几秒随机连发
    let celebrateTimer = null;
    let celebrateStopTimer = null;
    function startFullScreenFireworks(durationMs = 2600) {
      if (celebrateTimer) clearInterval(celebrateTimer);
      if (celebrateStopTimer) clearTimeout(celebrateStopTimer);

      const centerX = window.innerWidth * 0.5;
      const centerY = window.innerHeight * 0.42;
      burst(centerX, centerY);
      burst(window.innerWidth * 0.2, window.innerHeight * 0.55);
      burst(window.innerWidth * 0.8, window.innerHeight * 0.55);

      celebrateTimer = setInterval(() => {
        const x = rand(60, window.innerWidth - 60);
        const y = rand(80, window.innerHeight * 0.7);
        burst(x, y);
      }, 120);

      celebrateStopTimer = setTimeout(() => {
        clearInterval(celebrateTimer);
        celebrateTimer = null;
      }, durationMs);
    }

    function openWishModal() {
      if (!wishModal || !wishText) return;
      wishText.textContent = buildWish();
      wishModal.classList.add("show");
      startFullScreenFireworks();
    }

    function closeWishModal() {
      if (!wishModal) return;
      wishModal.classList.remove("show");
    }

    if (wishBtn) {
      wishBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openWishModal();
      });
    }
    if (modalCloseBtn) modalCloseBtn.addEventListener("click", closeWishModal);
    if (wishModal) {
      wishModal.addEventListener("click", (e) => {
        if (e.target === wishModal) closeWishModal();
      });
    }
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeWishModal();
    });

    if (copyBtn) {
      copyBtn.addEventListener("click", async () => {
        const text = buildWish();
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = "已复制";
          setTimeout(() => (copyBtn.textContent = "复制祝福文字"), 1200);
        } catch {
          alert("复制失败：请手动复制。\n\n" + text);
        }
      });
    }

    // --- 点击烟花 + 彩带（Canvas 粒子动画） ---
    const canvas = document.getElementById("fxCanvas");
    const ctx = canvas.getContext("2d");
    const particles = [];
    const colors = [
      "#ff4d8d",
      "#ff8ac2",
      "#ffd166",
      "#8ecae6",
      "#a7f3d0",
      "#c4b5fd",
      "#fb7185",
    ];

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function burst(x, y) {
      const count = 90;
      for (let i = 0; i < count; i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(2.2, 7.2);
        const kind = Math.random() < 0.55 ? "confetti" : "spark";
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - rand(1.2, 3.4),
          life: rand(55, 95),
          ttl: 0,
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.18, 0.18),
          size: kind === "confetti" ? rand(6, 10) : rand(2, 4),
          kind,
          color: colors[(Math.random() * colors.length) | 0],
        });
      }
    }

    function tick() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.ttl += 1;
        const t = p.ttl / p.life;

        // physics
        p.vx *= 0.99;
        p.vy = p.vy * 0.99 + 0.12; // gravity
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;

        const alpha = Math.max(0, 1 - t);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;

        if (p.kind === "confetti") {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }

        if (p.ttl >= p.life || p.y > window.innerHeight + 80) {
          particles.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    tick();

    function handleClick(e) {
      // 触发烟花彩带
      const x = e.clientX;
      const y = e.clientY;
      burst(x, y);

      // 也顺手“解锁”音乐（首次点击时开启声音）
      if (bgm && (bgm.paused || bgm.muted)) {
        enableSoundAndPlay().catch(() => {});
      }
    }
    document.addEventListener("click", handleClick, { passive: true });

    document.addEventListener("visibilitychange", () => {
      if (!bgm) return;
      if (document.visibilityState === "visible" && bgm.paused) {
        // 回到页面时尽量恢复播放（可能仍受策略限制）
        bgm.play().catch(() => {});
      }
    });
  </script>
</body>
</html>
